<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPTV Live by SBR</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
font-family: Arial;
background:#111;
color:white;
margin:0;
}

.container{
display:flex;
height:100vh;
}

.player{
flex:2;
display:flex;
justify-content:center;
align-items:center;
}

video{
width:90%;
max-height:80vh;
background:black;
}

.channels{
flex:1;
overflow-y:auto;
background:#1c1c1c;
padding:10px;
}

.channel{
padding:8px;
border-bottom:1px solid #333;
cursor:pointer;
}

.channel:hover{
background:#333;
}

</style>
</head>

<body>

<h2 style="text-align:center">IPTV Live by SBR</h2>

<div class="container">

<div class="player">
<video id="video" controls></video>
</div>

<div id="channels" class="channels">
Loading channels...
</div>

</div>

<script>

const video = document.getElementById('video')

function play(url){

if(Hls.isSupported()){

const hls = new Hls()

hls.loadSource(url)

hls.attachMedia(video)

}

else{

video.src = url

}

}

fetch("https://iptv-org.github.io/iptv/index.m3u")

.then(r=>r.text())

.then(data=>{

let lines = data.split("\n")

let html=""

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let name = lines[i].split(",")[1]

let url = lines[i+1]

html += `<div class="channel" onclick="play('${url}')">${name}</div>`

}

}

document.getElementById("channels").innerHTML = html

})

</script>

</body>
</html>
