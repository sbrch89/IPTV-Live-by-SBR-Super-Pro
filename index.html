<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPTV Live by SBR</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>

<h2>IPTV Live by SBR</h2>

<video id="video" controls width="800"></video>

<br><br>

<input type="text" id="url" placeholder="Paste m3u8 link here" size="60">
<button onclick="play()">Play</button>

<script>

function play(){

var video = document.getElementById('video');
var url = document.getElementById('url').value;

if(Hls.isSupported()){
var hls = new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}

}

</script>

</body>
</html>
